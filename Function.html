<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
    <head>
        <title>Buttons</title>
    </head>
     <body>
        <h3>Buttons</h3>
        <hr>
        <button onclick="changeGreeting()" style="background-color:lightblue;border:2px solid black;border-radius:10px;">Click Me</button>

        <p id="Greeting">Hello Ibrah</p>
        <script>
            function changeGreeting() {
                document.getElementById("Greeting").innerHTML = "Goodbye Ibrah!";
            }
            document.getElementById("Greeting").innerHTML = "Hello Ibrah, welcome to the Buttons page!";
        </script>
    </body>
</html>
